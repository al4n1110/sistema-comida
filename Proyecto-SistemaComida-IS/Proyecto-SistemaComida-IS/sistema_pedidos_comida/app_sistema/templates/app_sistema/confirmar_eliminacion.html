{% extends "app_sistema/base.html" %}

{% block title %}Confirmar eliminación | Delivery Express{% endblock %}

{% block content %}
<div class="row justify-content-center fade-in-up">
    <div class="col-md-6">
        <div class="card card-delivery">
            <div class="card-body text-center">
                <h3 class="page-title mb-3">⚠️ Confirmar eliminación</h3>
                <p class="subtitle-muted mb-4">
                    {{ mensaje }}
                </p>

                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex justify-content-center gap-3">
                        <a href="{{ cancel_url }}" class="btn btn-outline-secondary btn-pill">
                            Cancelar
                        </a>
                        <button type="submit" class="btn btn-danger btn-pill">
                            Sí, eliminar
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
